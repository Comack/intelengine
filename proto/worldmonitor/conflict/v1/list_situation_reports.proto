syntax = "proto3";

package worldmonitor.conflict.v1;

import "sebuf/http/annotations.proto";

message SituationReport {
  string id = 1;
  string title = 2;
  string source = 3;
  string url = 4;
  string published_at = 5;
  string summary = 6;
  repeated string countries = 7;
}

message ListSituationReportsRequest {
  int32 limit = 1 [(sebuf.http.query) = { name: "limit" }]; // Default 20
  string query = 2 [(sebuf.http.query) = { name: "query" }]; // Optional search term
}

message ListSituationReportsResponse {
  repeated SituationReport reports = 1;
}
